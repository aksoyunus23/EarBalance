name: Build EarBalance APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      # Hatalı olan tüm değişkenleri geçersiz kılıp, sadece Gradle'ın kendi parametresini kullanıyoruz
      run: |
        unset JAVA_TOOL_OPTIONS
        unset _JAVA_OPTIONS
        unset JAVA_OPTS
        ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx2g -XX:MaxMetaspaceSize=512m" --stacktrace

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: EarBalance-APK
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30
