name: Build EarBalance APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      # Hiçbir export veya unset kullanmadan, doğrudan Gradle'ın iç ayarını hedefliyoruz
      run: ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx2048m -XX:MaxMetaspaceSize=512m"

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: EarBalance-APK
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30
